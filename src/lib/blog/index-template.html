<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>dflaten.dev</title>
        <link rel="icon" type="image/x-icon" href="/favicon.png" />
        <script>
            (() => {{
                const storedPreference = localStorage.getItem("theme-preference");
                const preference =
                    storedPreference === "light" || storedPreference === "dark"
                        ? storedPreference
                        : "auto";
                document.documentElement.dataset.theme = preference;
            }})();
        </script>
        <link rel="stylesheet" href="/root.css" />
        <link rel="stylesheet" href="/blog/index.css" />
        <script defer src="/theme.js"></script>
    </head>

    <body>
        <main>
            <header>
                <div class="nav-bar-title-left">
                    <a class="nav-bar-title" href="/">dflaten.dev</a>
                    <a class="nav-bar-link" href="/blog/">Blog</a>
                    <a class="nav-bar-link" href="/projects/">Projects</a>
                </div>
                <div class="nav-bar-title-right">
                    <details class="theme-picker" data-theme-menu>
                        <summary aria-label="Theme settings">
                            <svg
                                class="theme-picker-icon"
                                aria-hidden="true"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path d="M12 3v2.5" />
                                <path d="M12 18.5V21" />
                                <path d="M3 12h2.5" />
                                <path d="M18.5 12H21" />
                                <path d="M5.6 5.6l1.8 1.8" />
                                <path d="M16.6 16.6l1.8 1.8" />
                                <path d="M5.6 18.4l1.8-1.8" />
                                <path d="M16.6 7.4l1.8-1.8" />
                                <path d="M15.5 12a3.5 3.5 0 1 1-7 0a3.5 3.5 0 0 1 7 0Z" />
                            </svg>
                        </summary>
                        <div class="theme-picker-menu">
                            <label>
                                Theme:
                                <span data-theme-current-label>Auto</span>
                            </label>
                            <div class="theme-picker-options">
                                <button
                                    class="theme-picker-option"
                                    type="button"
                                    data-theme-option="auto"
                                >
                                    Auto
                                </button>
                                <button
                                    class="theme-picker-option"
                                    type="button"
                                    data-theme-option="light"
                                >
                                    Light
                                </button>
                                <button
                                    class="theme-picker-option"
                                    type="button"
                                    data-theme-option="dark"
                                >
                                    Dark
                                </button>
                            </div>
                        </div>
                    </details>
                    <a
                        class="nav-bar-social-link"
                        href="https://github.com/dflaten"
                        target="_blank"
                        rel="noopener noreferrer"
                        ><img
                            class="github-social-icon"
                            src="/github-logo.png"
                            width="24"
                            height="24"
                    /></a>
                    <a
                        class="nav-bar-social-link"
                        href="https://www.linkedin.com/in/david-flaten0/"
                        target="_blank"
                        rel="noopener noreferrer"
                        ><img src="/linkedin-logo.png" width="24" height="24"
                    /></a>
                </div>
            </header>
            <div class="container" id="blog-post-container">
                <h1>Blog</h1>
                <p>
                    I plan on creating a few entries in my blog as I find
                    subjects that are interesting.
                </p>
                <br />
                {posts}
            </div>
        </main>
    </body>
</html>
